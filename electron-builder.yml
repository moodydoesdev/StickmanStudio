appId: com.stickmanstudio.app
productName: Stickman Studio
copyright: Copyright © 2026

directories:
  buildResources: build
  output: dist

# Ship the Claude Code skills inside the app so the install wizard can copy them
# into ~/.claude/skills on first run. Heavy deps (ffmpeg, python venv, the CLIs)
# are installed by the first-run wizard, not bundled, to keep the download small.
extraResources:
  - from: resources/skills
    to: skills
    filter:
      - "**/*"

files:
  - "out/**/*"
  - "package.json"
  - "!**/.vscode/*"
  - "!**/*.map"

asarUnpack:
  - "resources/**"

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Stickman Studio

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    # electron-updater applies macOS updates from the .zip (Squirrel.Mac can't
    # update a .dmg), so a zip must be published alongside it. NOTE: macOS
    # auto-update only works when the app is code-signed + notarized — the
    # current CI build is unsigned, so macOS users update by downloading the dmg
    # until a signing identity (CSC_LINK/CSC_KEY_PASSWORD) is added to the workflow.
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.video
  artifactName: ${productName}-${version}-${arch}.${ext}
  # The app shells out to node/python/ffmpeg/claude, so it needs an unsandboxed,
  # hardened-runtime build. Provide signing identity via CSC_LINK env at build time.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

publish:
  provider: github
  owner: moodydoesdev
  repo: StickmanStudio
  # Assets upload to a draft release named after the version; publish it when ready.
  # IMPORTANT: the in-app auto-updater cannot see DRAFT releases — installed apps
  # only pick up an update once you publish the release on GitHub. (Switch this to
  # `release` if you'd rather have CI publish immediately with no manual step.)
  releaseType: draft
